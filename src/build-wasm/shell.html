<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MulanGeo WebAssembly</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1e1e2e;
      color: #cdd6f4;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    h1 { font-size: 1.4rem; margin-bottom: 12px; letter-spacing: 1px; color: #89b4fa; }
    #canvas-container {
      border: 2px solid #313244;
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    canvas {
      display: block;
      background: #1e1e2e;
    }
    #status {
      margin-top: 10px;
      font-size: 0.8rem;
      color: #6c7086;
    }
    #progress {
      margin-top: 6px;
      width: 800px;
      height: 4px;
      background: #313244;
      border-radius: 2px;
      overflow: hidden;
    }
    #progress-bar {
      height: 100%;
      width: 0%;
      background: #89b4fa;
      transition: width 0.2s;
    }
  </style>
</head>
<body>
  <h1>MulanGeo · WebAssembly</h1>
  <div id="canvas-container">
    <canvas id="canvas" width="800" height="600" oncontextmenu="event.preventDefault()"></canvas>
  </div>
  <div id="status">Loading...</div>
  <div id="progress"><div id="progress-bar"></div></div>

  <script type="text/javascript">
    var statusEl   = document.getElementById('status');
    var progressEl = document.getElementById('progress-bar');

    var Module = {
      canvas: (function() { return document.getElementById('canvas'); })(),

      setStatus: function(text) {
        if (!text) text = 'Ready';
        statusEl.textContent = text;
      },

      monitorRunDependencies: function(left) {
        // 粗略进度（依赖项倒计时）
        if (left > 0) {
          progressEl.style.width = Math.max(0, 100 - left * 5) + '%';
        } else {
          progressEl.style.width = '100%';
          setTimeout(function() {
            document.getElementById('progress').style.display = 'none';
          }, 500);
        }
      },

      onRuntimeInitialized: function() {
        statusEl.textContent = 'Running';
      },

      print: function(text) {
        console.log('[WASM]', text);
      },

      printErr: function(text) {
        console.error('[WASM ERROR]', text);
        statusEl.style.color = '#f38ba8';
        statusEl.textContent = 'Error: ' + text;
      }
    };

    window.onerror = function(msg, url, line, col, error) {
      statusEl.style.color = '#f38ba8';
      statusEl.textContent = 'Fatal: ' + msg;
    };
  </script>
  {{{ SCRIPT }}}
</body>
</html>
